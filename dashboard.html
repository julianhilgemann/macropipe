<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>macropipe Dashboard</title>
<style>
  :root {
    --bg: #1e1e2e; --surface: #262637; --border: #363650;
    --text: #e0e0e0; --muted: #8888aa; --accent: #7c8fff;
    --green: #4ecb71; --red: #ff6b6b; --yellow: #ffd93d;
    --blue: #5b9dff; --purple: #b48eff; --orange: #ff9f43;
    --teal: #2dd4bf; --pink: #f472b6;
    --max-width: 1440px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

  .container { max-width: var(--max-width); margin: 0 auto; }

  .header { padding: 20px 32px 12px; display: flex; justify-content: space-between; align-items: baseline; }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header .subtitle { color: var(--muted); font-size: 13px; }

  .tabs { display: flex; gap: 0; padding: 0 32px; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 20px; cursor: pointer; color: var(--muted); font-size: 13px; font-weight: 500;
         border-bottom: 2px solid transparent; transition: all 0.2s; user-select: none; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .toolbar { padding: 14px 32px 0; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .toolbar label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-right: 2px; }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .pill { padding: 4px 12px; font-size: 12px; border-radius: 14px; cursor: pointer; user-select: none;
          border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.15s; }
  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  select.filter-select {
    background: var(--surface); color: var(--text); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; outline: none;
  }
  select.filter-select:focus { border-color: var(--accent); }

  .page { display: none; padding: 20px 32px; }
  .page.active { display: block; }

  .grid { display: grid; gap: 16px; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }
  .grid-1 { grid-template-columns: 1fr; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .card h3 { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .kpi-value { font-size: 28px; font-weight: 700; }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .kpi-delta { font-size: 13px; font-weight: 600; margin-top: 2px; }
  .kpi-delta.up { color: var(--green); }
  .kpi-delta.down { color: var(--red); }

  .chart-card { padding: 16px; }
  .chart-card h3 { margin-bottom: 12px; }
  .chart-card svg { width: 100%; height: auto; }

  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  table.metrics { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.metrics th { text-align: left; padding: 8px 12px; color: var(--muted); font-weight: 500;
                     border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; }
  table.metrics td { padding: 7px 12px; border-bottom: 1px solid var(--border); }
  table.metrics tr:hover { background: rgba(124,143,255,0.05); }

  .model-badge { padding: 2px 8px; border-radius: 4px; font-weight: 600; font-size: 11px; display: inline-block; }
  .model-badge.ces { background: rgba(91,157,255,0.18); color: var(--blue); }
  .model-badge.mstl { background: rgba(45,212,191,0.18); color: var(--teal); }
  .model-badge.best { background: rgba(78,203,113,0.15); color: var(--green); }

  .ci-band { opacity: 0.15; }

  .info-box { background: rgba(124,143,255,0.06); border: 1px solid rgba(124,143,255,0.15); border-radius: 8px;
              padding: 14px 18px; font-size: 12px; line-height: 1.6; color: var(--muted); margin-bottom: 16px; }
  .info-box strong { color: var(--text); }
  .info-box code { background: rgba(124,143,255,0.1); padding: 1px 5px; border-radius: 3px; font-size: 11px; color: var(--accent); }

  .section-gap { margin-top: 16px; }

  /* Responsive */
  @media (max-width: 1100px) {
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 700px) {
    .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
    .header { flex-direction: column; gap: 4px; padding: 16px 16px 8px; }
    .tabs { padding: 0 16px; overflow-x: auto; }
    .tab { padding: 10px 14px; white-space: nowrap; }
    .page { padding: 16px; }
    .toolbar { padding: 10px 16px 0; }
    .kpi-value { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>macropipe</h1>
    <span class="subtitle">German Macro & Banking Time Series Dashboard</span>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showPage('overview')">Macro Overview</div>
    <div class="tab" onclick="showPage('forecast')">Housing Loan Forecast</div>
    <div class="tab" onclick="showPage('diagnostics')">Forecast Diagnostics</div>
  </div>

  <!-- Toolbar / filters -->
  <div class="toolbar" id="toolbar"></div>

  <div id="overview" class="page active"></div>
  <div id="forecast" class="page"></div>
  <div id="diagnostics" class="page"></div>
</div>

<script>
// ── State ──
let DATA = null;
let FILTERS = {
  dateRange: 'all',  // 'all', '5y', '3y', '1y'
  ciLevel: 95,       // 90 or 95
};
let currentPage = 'overview';

function showPage(id) {
  currentPage = id;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelector(`.tab[onclick="showPage('${id}')"]`).classList.add('active');
  buildToolbar();
  rebuildCurrentPage();
}

function rebuildCurrentPage() {
  if (!DATA) return;
  if (currentPage === 'overview') buildOverview();
  else if (currentPage === 'forecast') buildForecast();
  else if (currentPage === 'diagnostics') buildDiagnostics();
}

// ── Toolbar ──
function buildToolbar() {
  const tb = document.getElementById('toolbar');
  let html = '';

  // Date range filter (all pages)
  html += '<div class="filter-group"><label>Range</label>';
  ['all', '5y', '3y', '1y'].forEach(r => {
    const label = r === 'all' ? 'All' : r.toUpperCase();
    html += `<span class="pill${FILTERS.dateRange === r ? ' active' : ''}" onclick="setFilter('dateRange','${r}')">${label}</span>`;
  });
  html += '</div>';

  // CI level (forecast + diagnostics only)
  if (currentPage === 'forecast' || currentPage === 'diagnostics') {
    html += '<div class="filter-group"><label>CI Level</label>';
    [90, 95].forEach(l => {
      html += `<span class="pill${FILTERS.ciLevel === l ? ' active' : ''}" onclick="setFilter('ciLevel',${l})">${l}%</span>`;
    });
    html += '</div>';
  }

  tb.innerHTML = html;
}

function setFilter(key, val) {
  FILTERS[key] = val;
  buildToolbar();
  rebuildCurrentPage();
}

// ── Helpers ──
const COLORS = {
  'ECB_MRO': '#5b9dff', 'ECB_Lower': '#2dd4bf', 'ECB_Upper': '#ff9f43', 'EURIBOR_3M': '#b48eff',
  'Yield_2Y': '#5b9dff', 'Yield_10Y': '#ff9f43',
  'HL_Rate_Total': '#7c8fff', 'HL_Rate_Float': '#2dd4bf', 'HL_Rate_1_5Y': '#ffd93d',
  'HL_Rate_5_10Y': '#ff9f43', 'HL_Rate_10Y': '#f472b6',
  'HL_Vol_Float': '#2dd4bf', 'HL_Vol_1_5Y': '#ffd93d', 'HL_Vol_5_10Y': '#ff9f43', 'HL_Vol_10Y': '#f472b6',
  'HL_Vol_Total': '#7c8fff',
  'Inflation': '#ff6b6b', 'GDP': '#4ecb71',
  'actual': '#7c8fff', 'forecast': '#ff9f43',
};

const DISPLAY_NAMES = {
  'ECB_MRO': 'MRO', 'ECB_Lower': 'Deposit Facility', 'ECB_Upper': 'Marginal Lending', 'EURIBOR_3M': 'EURIBOR 3M',
  'Yield_2Y': '2Y Bund', 'Yield_10Y': '10Y Bund',
  'HL_Rate_Total': 'APRC Total', 'HL_Rate_Float': 'Float', 'HL_Rate_1_5Y': '1-5Y',
  'HL_Rate_5_10Y': '5-10Y', 'HL_Rate_10Y': '10Y+',
  'HL_Vol_Float': 'Float', 'HL_Vol_1_5Y': '1-5Y', 'HL_Vol_5_10Y': '5-10Y', 'HL_Vol_10Y': '10Y+',
  'HL_Vol_Total': 'Total',
};

const RATE_SERIES = ['ECB_MRO', 'ECB_Lower', 'ECB_Upper', 'EURIBOR_3M', 'Yield_2Y', 'Yield_10Y',
  'HL_Rate_Total', 'HL_Rate_Float', 'HL_Rate_1_5Y', 'HL_Rate_5_10Y', 'HL_Rate_10Y'];

const MODEL_DESCRIPTIONS = {
  'CES': 'Complex Exponential Smoothing — a state-space model that captures level, trend, and seasonality via exponential smoothing with potentially complex-valued components.',
  'MSTL': 'Multiple Seasonal-Trend decomposition using LOESS — decomposes the series into multiple seasonal components + trend, then forecasts each piece separately.',
};

function getColor(name, i) {
  return COLORS[name] || ['#5b9dff','#2dd4bf','#ffd93d','#ff9f43','#f472b6','#b48eff','#4ecb71','#ff6b6b'][i % 8];
}

function groupBy(arr, key) {
  const m = {};
  arr.forEach(r => { (m[r[key]] = m[r[key]] || []).push(r); });
  return m;
}

function parseDate(s) { return new Date(s); }

function formatDate(d) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + String(d.getFullYear()).slice(2);
}

function getDateCutoff() {
  if (FILTERS.dateRange === 'all') return null;
  const now = new Date();
  const years = parseInt(FILTERS.dateRange);
  return new Date(now.getFullYear() - years, now.getMonth(), 1).toISOString().slice(0, 10);
}

function applyDateFilter(rows) {
  const cutoff = getDateCutoff();
  if (!cutoff) return rows;
  return rows.filter(r => r.period_date >= cutoff);
}

function isRateSeries(name) {
  return RATE_SERIES.includes(name);
}

// ── SVG chart builders ──

function buildLineChart(container, seriesNames, opts = {}) {
  const {
    height = 240, title = '', showCI = false,
    yFormat = v => v.toFixed(2), showForecast = false, stacked = false
  } = opts;
  const ciLevel = FILTERS.ciLevel;

  // Use viewBox for responsive scaling; logical width = 600
  const logicalW = 600;
  const margin = { top: 8, right: 16, bottom: 32, left: 56 };
  const w = logicalW - margin.left - margin.right;
  const h = height - margin.top - margin.bottom;

  let rows = DATA.series.filter(r => seriesNames.includes(r.series_name));
  if (!showForecast) rows = rows.filter(r => r.value_type === 'actual');
  rows = applyDateFilter(rows);
  if (rows.length === 0) return;

  const grouped = groupBy(rows, 'series_name');
  const allDates = [...new Set(rows.map(r => r.period_date))].sort();
  const xScale = i => (i / Math.max(allDates.length - 1, 1)) * w;

  let yMin, yMax;
  if (showCI) {
    const ciLo = `ci_lower_${ciLevel}`, ciHi = `ci_upper_${ciLevel}`;
    const vals = rows.map(r => [r.value, r[ciLo], r[ciHi]]).flat().filter(v => v != null && !isNaN(v));
    yMin = Math.min(...vals); yMax = Math.max(...vals);
  } else if (stacked) {
    const dateSums = {};
    allDates.forEach(d => {
      dateSums[d] = seriesNames.reduce((sum, s) => {
        const row = (grouped[s] || []).find(r => r.period_date === d);
        return sum + (row ? row.value : 0);
      }, 0);
    });
    yMin = 0; yMax = Math.max(...Object.values(dateSums));
  } else {
    const vals = rows.map(r => r.value).filter(v => v != null);
    yMin = Math.min(...vals); yMax = Math.max(...vals);
  }

  const yPad = (yMax - yMin) * 0.08 || 1;
  yMin -= yPad; yMax += yPad;
  if (stacked) yMin = 0;
  const yScale = v => h - ((v - yMin) / (yMax - yMin)) * h;

  let svg = `<svg viewBox="0 0 ${logicalW} ${height}" preserveAspectRatio="xMidYMid meet">`;
  svg += `<g transform="translate(${margin.left},${margin.top})">`;

  // Grid
  const nTicks = 5;
  for (let i = 0; i <= nTicks; i++) {
    const y = (i / nTicks) * h;
    const val = yMax - (i / nTicks) * (yMax - yMin);
    svg += `<line x1="0" y1="${y}" x2="${w}" y2="${y}" stroke="#363650" stroke-width="0.5"/>`;
    svg += `<text x="-8" y="${y + 4}" fill="#8888aa" font-size="10" text-anchor="end">${yFormat(val)}</text>`;
  }

  // X-axis
  const labelStep = Math.max(1, Math.floor(allDates.length / 8));
  allDates.forEach((d, i) => {
    if (i % labelStep === 0) {
      svg += `<text x="${xScale(i)}" y="${h + 18}" fill="#8888aa" font-size="9" text-anchor="middle">${formatDate(parseDate(d))}</text>`;
    }
  });

  if (stacked) {
    const orderedSeries = seriesNames.filter(s => grouped[s]);
    let prevY = allDates.map(() => 0);
    orderedSeries.forEach((sName, si) => {
      const sRows = grouped[sName] || [];
      const vals = allDates.map(d => {
        const row = sRows.find(r => r.period_date === d);
        return row ? row.value : 0;
      });
      const currY = vals.map((v, i) => prevY[i] + v);
      let path = '';
      currY.forEach((v, i) => { path += (i === 0 ? 'M' : 'L') + `${xScale(i).toFixed(1)},${yScale(v).toFixed(1)}`; });
      for (let i = prevY.length - 1; i >= 0; i--) { path += `L${xScale(i).toFixed(1)},${yScale(prevY[i]).toFixed(1)}`; }
      path += 'Z';
      svg += `<path d="${path}" fill="${getColor(sName, si)}" opacity="0.7"/>`;
      prevY = currY;
    });
  } else {
    // CI bands
    if (showCI) {
      const ciLo = `ci_lower_${ciLevel}`, ciHi = `ci_upper_${ciLevel}`;
      seriesNames.forEach((sName, si) => {
        const sRows = (grouped[sName] || []).filter(r => r[ciLo] != null && !isNaN(r[ciLo]));
        if (sRows.length === 0) return;
        let band = '';
        const fctDates = sRows.map(r => r.period_date);
        fctDates.forEach((d, i) => {
          const idx = allDates.indexOf(d);
          band += (i === 0 ? 'M' : 'L') + `${xScale(idx).toFixed(1)},${yScale(sRows[i][ciHi]).toFixed(1)}`;
        });
        for (let i = fctDates.length - 1; i >= 0; i--) {
          const idx = allDates.indexOf(fctDates[i]);
          band += `L${xScale(idx).toFixed(1)},${yScale(sRows[i][ciLo]).toFixed(1)}`;
        }
        band += 'Z';
        svg += `<path d="${band}" fill="${getColor(sName, si)}" class="ci-band"/>`;
      });
    }

    // Lines
    seriesNames.forEach((sName, si) => {
      const sRows = grouped[sName] || [];
      const actRows = sRows.filter(r => r.value_type === 'actual');
      const fctRows = sRows.filter(r => r.value_type === 'forecast');

      if (actRows.length > 0) {
        let path = '';
        actRows.forEach((r, i) => {
          const idx = allDates.indexOf(r.period_date);
          path += (i === 0 ? 'M' : 'L') + `${xScale(idx).toFixed(1)},${yScale(r.value).toFixed(1)}`;
        });
        svg += `<path d="${path}" fill="none" stroke="${getColor(sName, si)}" stroke-width="1.5"/>`;
      }

      if (showForecast && fctRows.length > 0) {
        const lastAct = actRows[actRows.length - 1];
        let path = '';
        if (lastAct) {
          const idx = allDates.indexOf(lastAct.period_date);
          path = `M${xScale(idx).toFixed(1)},${yScale(lastAct.value).toFixed(1)}`;
        }
        fctRows.forEach((r, i) => {
          const idx = allDates.indexOf(r.period_date);
          path += (i === 0 && !lastAct ? 'M' : 'L') + `${xScale(idx).toFixed(1)},${yScale(r.value).toFixed(1)}`;
        });
        svg += `<path d="${path}" fill="none" stroke="${getColor(sName, si)}" stroke-width="1.5" stroke-dasharray="5,3"/>`;
      }
    });
  }

  // Forecast boundary
  if (showForecast) {
    const fctRows = rows.filter(r => r.value_type === 'forecast');
    if (fctRows.length > 0) {
      const firstFct = fctRows.map(r => r.period_date).sort()[0];
      const idx = allDates.indexOf(firstFct);
      if (idx > 0) {
        svg += `<line x1="${xScale(idx)}" y1="0" x2="${xScale(idx)}" y2="${h}" stroke="#8888aa" stroke-width="0.5" stroke-dasharray="3,3"/>`;
        svg += `<text x="${xScale(idx) + 4}" y="10" fill="#8888aa" font-size="9">Forecast</text>`;
      }
    }
  }

  svg += `</g></svg>`;

  // Legend
  let legend = '<div class="legend">';
  seriesNames.forEach((s, i) => {
    legend += `<div class="legend-item"><div class="legend-dot" style="background:${getColor(s,i)}"></div>${DISPLAY_NAMES[s] || s}</div>`;
  });
  if (showForecast) {
    legend += `<div class="legend-item" style="margin-left:8px"><svg width="24" height="8" style="display:inline"><line x1="0" y1="4" x2="24" y2="4" stroke="#8888aa" stroke-width="1.5" stroke-dasharray="4,2"/></svg> Forecast</div>`;
    if (showCI) {
      legend += `<div class="legend-item"><div style="width:16px;height:8px;background:var(--accent);opacity:0.15;border-radius:2px"></div> ${FILTERS.ciLevel}% CI</div>`;
    }
  }
  legend += '</div>';

  const card = document.createElement('div');
  card.className = 'card chart-card';
  card.innerHTML = `<h3>${title}</h3>${svg}${legend}`;
  container.appendChild(card);
}

function buildKpiCard(container, seriesName, label, unit, decimals = 2) {
  const rows = DATA.series.filter(r => r.series_name === seriesName && r.value_type === 'actual')
    .sort((a, b) => a.period_date.localeCompare(b.period_date));
  if (rows.length === 0) return;

  const latest = rows[rows.length - 1];
  const prev = rows.length > 12 ? rows[rows.length - 13] : null;
  const val = latest.value;
  const formatted = decimals === 0 ? Math.round(val).toLocaleString() : val.toFixed(decimals);

  let deltaHtml = '';
  if (prev) {
    const isRate = isRateSeries(seriesName);
    if (isRate) {
      // Absolute change in bps
      const deltaBps = Math.round((val - prev.value) * 100);
      const cls = deltaBps >= 0 ? 'up' : 'down';
      const arrow = deltaBps >= 0 ? '\u25B2' : '\u25BC';
      deltaHtml = `<div class="kpi-delta ${cls}">${arrow} ${Math.abs(deltaBps)} bps YoY</div>`;
    } else {
      const delta = val - prev.value;
      const pct = ((delta / Math.abs(prev.value)) * 100);
      const cls = delta >= 0 ? 'up' : 'down';
      const arrow = delta >= 0 ? '\u25B2' : '\u25BC';
      deltaHtml = `<div class="kpi-delta ${cls}">${arrow} ${Math.abs(pct).toFixed(1)}% YoY</div>`;
    }
  }

  // Sparkline
  const last24 = rows.slice(-24);
  const sparkW = 120, sparkH = 28;
  const vals = last24.map(r => r.value);
  const sMin = Math.min(...vals), sMax = Math.max(...vals);
  const sRange = sMax - sMin || 1;
  let sparkPath = '';
  vals.forEach((v, i) => {
    const x = (i / Math.max(vals.length - 1, 1)) * sparkW;
    const y = sparkH - ((v - sMin) / sRange) * sparkH;
    sparkPath += (i === 0 ? 'M' : 'L') + `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const sparkColor = vals[vals.length-1] >= vals[0] ? '#4ecb71' : '#ff6b6b';
  const sparkSvg = `<svg width="${sparkW}" height="${sparkH}" style="margin-top:8px">
    <path d="${sparkPath}" fill="none" stroke="${sparkColor}" stroke-width="1.5"/>
  </svg>`;

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<h3>${label}</h3>
    <div class="kpi-value">${formatted}${unit ? ' <span style="font-size:14px;color:var(--muted)">' + unit + '</span>' : ''}</div>
    ${deltaHtml}
    <div class="kpi-sub">${formatDate(parseDate(latest.period_date))}</div>
    ${sparkSvg}`;
  container.appendChild(card);
}

// ── Page builders ──

function buildOverview() {
  const page = document.getElementById('overview');
  page.innerHTML = '';

  // KPI row
  const kpiGrid = document.createElement('div');
  kpiGrid.className = 'grid grid-4';
  buildKpiCard(kpiGrid, 'ECB_MRO', 'ECB Main Refi Rate', '%');
  buildKpiCard(kpiGrid, 'Inflation', 'HICP Inflation', 'Index', 1);
  buildKpiCard(kpiGrid, 'EURIBOR_3M', 'EURIBOR 3M', '%');
  buildKpiCard(kpiGrid, 'Yield_10Y', '10Y Bund Yield', '%');
  page.appendChild(kpiGrid);

  // Charts row 1
  const row1 = document.createElement('div');
  row1.className = 'grid grid-2 section-gap';
  buildLineChart(row1, ['ECB_MRO', 'ECB_Lower', 'ECB_Upper', 'EURIBOR_3M'],
    { title: 'ECB Policy Rates & EURIBOR 3M (%)', yFormat: v => v.toFixed(1) });
  buildLineChart(row1, ['Yield_2Y', 'Yield_10Y'],
    { title: 'Svensson Yield Curve: 2Y vs 10Y (%)', yFormat: v => v.toFixed(1) });
  page.appendChild(row1);

  // Charts row 2
  const row2 = document.createElement('div');
  row2.className = 'grid grid-2 section-gap';
  buildLineChart(row2, ['HL_Rate_Total', 'HL_Rate_Float', 'HL_Rate_1_5Y', 'HL_Rate_5_10Y', 'HL_Rate_10Y'],
    { title: 'Housing Loan Rates by Maturity (%)', yFormat: v => v.toFixed(1) });
  buildLineChart(row2, ['HL_Vol_Float', 'HL_Vol_1_5Y', 'HL_Vol_5_10Y', 'HL_Vol_10Y'],
    { title: 'Housing Loan Volume by Maturity (Mn EUR)', yFormat: v => Math.round(v).toLocaleString(), stacked: true });
  page.appendChild(row2);
}

function buildForecast() {
  const page = document.getElementById('forecast');
  page.innerHTML = '';

  const series = ['HL_Vol_Float', 'HL_Vol_1_5Y', 'HL_Vol_5_10Y', 'HL_Vol_10Y'];
  const titles = {
    'HL_Vol_Float': 'Float / \u22641Y', 'HL_Vol_1_5Y': '1-5Y',
    'HL_Vol_5_10Y': '5-10Y', 'HL_Vol_10Y': '10Y+'
  };

  // Summary cards
  const metaGrid = document.createElement('div');
  metaGrid.className = 'grid grid-4';
  series.forEach(s => {
    const fctRow = DATA.series.find(r => r.series_name === s && r.value_type === 'forecast');
    const modelName = fctRow ? (fctRow.model_name || '\u2014') : '\u2014';
    const fctRows = DATA.series.filter(r => r.series_name === s && r.value_type === 'forecast');
    const horizonMonths = fctRows.length;
    const modelClass = modelName.toLowerCase() === 'ces' ? 'ces' : modelName.toLowerCase() === 'mstl' ? 'mstl' : '';
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h3>${titles[s]} Forecast</h3>
      <div style="font-size:13px;margin-top:4px"><span class="model-badge ${modelClass}">${modelName}</span></div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px">
        Horizon: ${horizonMonths} months<br>
        ${FILTERS.ciLevel}% prediction intervals
      </div>`;
    metaGrid.appendChild(card);
  });
  page.appendChild(metaGrid);

  // Forecast charts
  const row = document.createElement('div');
  row.className = 'grid grid-2 section-gap';
  series.forEach(s => {
    buildLineChart(row, [s], {
      title: `${titles[s]} \u2014 Actual + Forecast (Mn EUR)`,
      showForecast: true, showCI: true,
      yFormat: v => Math.round(v).toLocaleString()
    });
  });
  page.appendChild(row);

  // Combined total
  const totalRow = document.createElement('div');
  totalRow.className = 'grid grid-1 section-gap';
  buildLineChart(totalRow, ['HL_Vol_Total'], {
    title: 'Total HL Volume \u2014 Actual + Forecast (Mn EUR)',
    showForecast: true, showCI: true,
    yFormat: v => Math.round(v).toLocaleString()
  });
  page.appendChild(totalRow);
}

function buildDiagnostics() {
  const page = document.getElementById('diagnostics');
  page.innerHTML = '';

  const ciLevel = FILTERS.ciLevel;
  const seriesOrder = ['HL_Vol_Total', 'HL_Vol_Float', 'HL_Vol_1_5Y', 'HL_Vol_5_10Y', 'HL_Vol_10Y'];

  // Explainer box
  const infoBox = document.createElement('div');
  infoBox.className = 'info-box';
  infoBox.innerHTML = `
    <strong>How to read this page</strong><br>
    Each housing-loan volume series is forecast independently. The pipeline evaluates candidate models and selects the
    best-performing one per series based on cross-validated accuracy. The table below shows which model was selected and the
    forecast horizon. The bar chart visualises average <strong>${ciLevel}% confidence-interval width</strong> \u2014
    wider bars indicate greater forecast uncertainty.<br><br>
    <strong>Model glossary:</strong><br>
    <span class="model-badge ces" style="margin-right:4px">CES</span>
    Complex Exponential Smoothing \u2014 a state-space model that captures level, trend and seasonality via exponential smoothing
    with potentially complex-valued components. Works well for series with smooth, regular patterns.<br>
    <span class="model-badge mstl" style="margin-right:4px;margin-top:4px">MSTL</span>
    Multiple Seasonal-Trend decomposition using LOESS \u2014 decomposes the series into multiple seasonal layers + trend,
    then forecasts each piece separately. Handles multiple overlapping seasonal patterns.
  `;
  page.appendChild(infoBox);

  // Derive best models
  const bestModels = {};
  seriesOrder.forEach(s => {
    const fctRow = DATA.series.find(r => r.series_name === s && r.value_type === 'forecast');
    if (fctRow) bestModels[s] = fctRow.model_name;
  });

  // Table
  const tableCard = document.createElement('div');
  tableCard.className = 'card';

  let tableHtml = '<h3>Selected Model per Series</h3>';
  tableHtml += '<table class="metrics"><thead><tr>';
  tableHtml += '<th>Series</th><th>Selected Model</th><th>Description</th><th>Horizon</th><th>' + ciLevel + '% CI</th>';
  tableHtml += '</tr></thead><tbody>';

  seriesOrder.forEach(s => {
    const fctRows = DATA.series.filter(r => r.series_name === s && r.value_type === 'forecast');
    const model = bestModels[s] || '\u2014';
    const ciLo = `ci_lower_${ciLevel}`;
    const hasCI = fctRows.some(r => r[ciLo] != null);
    const modelClass = model.toLowerCase() === 'ces' ? 'ces' : model.toLowerCase() === 'mstl' ? 'mstl' : '';
    const desc = MODEL_DESCRIPTIONS[model] || '\u2014';
    const shortDesc = desc.split('\u2014')[0].trim();
    tableHtml += `<tr>`;
    tableHtml += `<td style="font-weight:500">${s.replace('HL_Vol_', '')}</td>`;
    tableHtml += `<td><span class="model-badge ${modelClass}">${model}</span></td>`;
    tableHtml += `<td style="color:var(--muted);font-size:11px;max-width:260px">${shortDesc}</td>`;
    tableHtml += `<td style="text-align:center">${fctRows.length} mo</td>`;
    tableHtml += `<td style="text-align:center">${hasCI ? '\u2713' : '\u2014'}</td>`;
    tableHtml += `</tr>`;
  });
  tableHtml += '</tbody></table>';
  tableCard.innerHTML = tableHtml;
  page.appendChild(tableCard);

  // CI width bar chart
  const barCard = document.createElement('div');
  barCard.className = 'card chart-card section-gap';

  const logicalW = 900, barH = 220;
  const barMargin = { top: 12, right: 16, bottom: 40, left: 80 };
  const bw = logicalW - barMargin.left - barMargin.right;
  const bh = barH - barMargin.top - barMargin.bottom;

  const groupWidth = bw / seriesOrder.length;

  const ciLo = `ci_lower_${ciLevel}`, ciHi = `ci_upper_${ciLevel}`;
  const allWidths = DATA.series
    .filter(r => seriesOrder.includes(r.series_name) && r.value_type === 'forecast' && r[ciHi] != null && r[ciLo] != null)
    .map(r => r[ciHi] - r[ciLo]);
  const maxW = allWidths.length ? Math.max(...allWidths) : 1;

  let barSvg = `<svg viewBox="0 0 ${logicalW} ${barH}" preserveAspectRatio="xMidYMid meet">`;
  barSvg += `<g transform="translate(${barMargin.left},${barMargin.top})">`;

  for (let i = 0; i <= 4; i++) {
    const y = (i / 4) * bh;
    const val = maxW * (1 - i / 4);
    barSvg += `<line x1="0" y1="${y}" x2="${bw}" y2="${y}" stroke="#363650" stroke-width="0.5"/>`;
    barSvg += `<text x="-8" y="${y + 4}" fill="#8888aa" font-size="10" text-anchor="end">${Math.round(val).toLocaleString()}</text>`;
  }

  seriesOrder.forEach((s, gi) => {
    const sRows = DATA.series.filter(r => r.series_name === s && r.value_type === 'forecast' && r[ciHi] != null && r[ciLo] != null);
    const gx = gi * groupWidth + 4;
    const model = bestModels[s] || '';
    const barColor = model.toLowerCase() === 'ces' ? '#5b9dff' : model.toLowerCase() === 'mstl' ? '#2dd4bf' : '#8888aa';
    if (sRows.length === 0) {
      barSvg += `<text x="${gx + groupWidth / 2 - 4}" y="${bh + 16}" fill="#8888aa" font-size="10" text-anchor="middle">${s.replace('HL_Vol_', '')}</text>`;
      return;
    }
    const avgWidth = sRows.reduce((sum, r) => sum + (r[ciHi] - r[ciLo]), 0) / sRows.length;
    const barH2 = (avgWidth / maxW) * bh;
    const x = gx + groupWidth / 4;
    const y = bh - barH2;
    barSvg += `<rect x="${x}" y="${y}" width="${groupWidth / 2}" height="${barH2}" fill="${barColor}" opacity="0.8" rx="2"/>`;
    barSvg += `<text x="${x + groupWidth / 4}" y="${y - 4}" fill="${barColor}" font-size="9" text-anchor="middle">${Math.round(avgWidth).toLocaleString()}</text>`;
    barSvg += `<text x="${gx + groupWidth / 2 - 4}" y="${bh + 16}" fill="#8888aa" font-size="10" text-anchor="middle">${s.replace('HL_Vol_', '')}</text>`;
  });

  barSvg += `</g></svg>`;

  // Legend for bar chart
  let barLegend = '<div class="legend">';
  barLegend += '<div class="legend-item"><div class="legend-dot" style="background:#5b9dff"></div>CES</div>';
  barLegend += '<div class="legend-item"><div class="legend-dot" style="background:#2dd4bf"></div>MSTL</div>';
  barLegend += '</div>';

  barCard.innerHTML = `<h3>Avg ${ciLevel}% CI Width by Series (Mn EUR) \u2014 wider = more uncertain</h3>${barSvg}${barLegend}`;
  page.appendChild(barCard);
}

// ── Load and render ──
fetch('data/dashboard_data.json')
  .then(r => r.json())
  .then(d => {
    DATA = d;
    buildToolbar();
    buildOverview();
    buildForecast();
    buildDiagnostics();
  })
  .catch(err => {
    document.body.innerHTML += `<div style="padding:32px;color:#ff6b6b">Failed to load data: ${err.message}<br>Make sure data/dashboard_data.json exists. Run: .venv/bin/python orchestrate.py full</div>`;
  });
</script>
</body>
</html>
